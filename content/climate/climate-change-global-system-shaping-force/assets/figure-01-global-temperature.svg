<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Figure 1 Global mean temperature rise"><defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#020617"/><stop offset="1" stop-color="#071426"/></linearGradient><linearGradient id="line" x1="0" x2="1"><stop stop-color="#22c7f3"/><stop offset="1" stop-color="#f2b544"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1600" height="900" fill="url(#bg)"/><rect x="28" y="28" width="1544" height="844" rx="34" fill="none" stroke="#22c7f3" stroke-width="3" opacity=".75"/><text x="80" y="95" fill="#f2b544" font-size="42" font-family="Arial" font-weight="800">FIGURE 1</text><text x="80" y="170" fill="#f8fbff" font-size="68" font-family="Arial" font-weight="900">GLOBAL MEAN TEMPERATURE RISE</text><text x="80" y="226" fill="#d8e7ff" font-size="34" font-family="Arial">Global Mean Near-Surface Temperature Anomaly</text><text x="80" y="282" fill="#f2b544" font-size="96" font-family="Arial" font-weight="900" filter="url(#glow)">1.55 ± 0.13°C</text><text x="80" y="335" fill="#f8fbff" font-size="32" font-family="Arial">2024 above 1850–1900 levels • Warmest year in 175-year record</text><g transform="translate(95 390)"><line x1="0" y1="360" x2="1250" y2="360" stroke="#9fb2ca"/><line x1="0" y1="0" x2="0" y2="360" stroke="#9fb2ca"/><g stroke="#163b50" opacity=".7"><path d="M0 288H1250M0 216H1250M0 144H1250M0 72H1250"/></g><path d="M0 345 C110 335 210 325 310 300 C430 270 510 240 615 205 C720 165 810 120 910 95 C1030 65 1135 35 1250 20" fill="none" stroke="url(#line)" stroke-width="9" filter="url(#glow)"/><circle cx="1250" cy="20" r="14" fill="#f2b544" filter="url(#glow)"/><text x="0" y="405" fill="#d8e7ff" font-size="28" font-family="Arial">1850</text><text x="410" y="405" fill="#d8e7ff" font-size="28" font-family="Arial">1900</text><text x="805" y="405" fill="#d8e7ff" font-size="28" font-family="Arial">1950</text><text x="1160" y="405" fill="#d8e7ff" font-size="28" font-family="Arial">2024</text><text x="-62" y="12" fill="#22c7f3" font-size="28" font-family="Arial">°C</text></g><text x="80" y="825" fill="#22c7f3" font-size="28" font-family="Arial">Source:</text><text x="190" y="825" fill="#f8fbff" font-size="28" font-family="Arial">WMO State of the Global Climate 2024</text><image href="/assets/logo.png" x="1035" y="735" width="390" height="115" preserveAspectRatio="xMidYMid meet"/></svg>
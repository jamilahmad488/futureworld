<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Figure 2 Long-term human-caused warming"><defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#020617"/><stop offset="1" stop-color="#081426"/></linearGradient><linearGradient id="line" x1="0" x2="1"><stop stop-color="#22c7f3"/><stop offset="1" stop-color="#f2b544"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1600" height="900" fill="url(#bg)"/><rect x="28" y="28" width="1544" height="844" rx="34" fill="none" stroke="#22c7f3" stroke-width="3" opacity=".75"/><text x="80" y="95" fill="#f2b544" font-size="42" font-family="Arial" font-weight="800">FIGURE 2</text><text x="80" y="170" fill="#f8fbff" font-size="64" font-family="Arial" font-weight="900">LONG-TERM HUMAN-CAUSED WARMING</text><text x="80" y="230" fill="#d8e7ff" font-size="34" font-family="Arial">Global surface temperature change compared with 1850–1900</text><text x="120" y="355" fill="#f2b544" font-size="120" font-family="Arial" font-weight="900" filter="url(#glow)">1.1°C</text><text x="120" y="410" fill="#f8fbff" font-size="34" font-family="Arial">average warming during 2011–2020</text><g transform="translate(620 300)"><rect x="0" y="0" width="760" height="300" rx="28" fill="rgba(34,199,243,.06)" stroke="#22c7f3"/><text x="44" y="70" fill="#f8fbff" font-size="38" font-family="Arial" font-weight="800">IPCC AR6 scientific basis</text><text x="44" y="130" fill="#d8e7ff" font-size="30" font-family="Arial">Human activities have unequivocally caused global warming.</text><text x="44" y="195" fill="#22c7f3" font-size="30" font-family="Arial">Every increment of warming intensifies multiple hazards.</text><text x="44" y="260" fill="#f2b544" font-size="30" font-family="Arial">Risk increases through compound and cascading pathways.</text></g><g transform="translate(95 530)"><line x1="0" y1="210" x2="1260" y2="210" stroke="#9fb2ca"/><path d="M0 195 C120 185 225 170 330 150 C450 125 570 95 690 70 C820 45 950 30 1080 18 C1160 12 1220 8 1260 5" fill="none" stroke="url(#line)" stroke-width="8" filter="url(#glow)"/></g><text x="80" y="825" fill="#22c7f3" font-size="28" font-family="Arial">Source:</text><text x="190" y="825" fill="#f8fbff" font-size="28" font-family="Arial">IPCC AR6 Synthesis Report (2023)</text><image href="/assets/logo.png" x="1035" y="735" width="390" height="115" preserveAspectRatio="xMidYMid meet"/></svg>
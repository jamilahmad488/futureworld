<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Figure 3 Sea-level rise and ocean heat"><defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#020617"/><stop offset="1" stop-color="#071426"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1600" height="900" fill="url(#bg)"/><rect x="28" y="28" width="1544" height="844" rx="34" fill="none" stroke="#22c7f3" stroke-width="3" opacity=".75"/><text x="80" y="95" fill="#f2b544" font-size="42" font-family="Arial" font-weight="800">FIGURE 3</text><text x="80" y="165" fill="#f8fbff" font-size="66" font-family="Arial" font-weight="900">SEA-LEVEL RISE &amp; OCEAN HEAT</text><text x="80" y="225" fill="#d8e7ff" font-size="34" font-family="Arial">Key climate indicators reached record levels in 2024</text><g transform="translate(80 290)"><rect width="450" height="110" rx="22" fill="rgba(34,199,243,.07)" stroke="#22c7f3"/><text x="34" y="45" fill="#22c7f3" font-size="34" font-family="Arial" font-weight="800">SEA-LEVEL RISE</text><text x="34" y="88" fill="#f2b544" font-size="36" font-family="Arial" font-weight="900">~4.7 mm/yr</text><rect y="140" width="450" height="110" rx="22" fill="rgba(34,199,243,.07)" stroke="#22c7f3"/><text x="34" y="185" fill="#22c7f3" font-size="34" font-family="Arial" font-weight="800">OCEAN HEAT</text><text x="34" y="228" fill="#f8fbff" font-size="32" font-family="Arial">Record high in 2024</text><rect y="280" width="450" height="110" rx="22" fill="rgba(242,181,68,.07)" stroke="#f2b544"/><text x="34" y="325" fill="#f2b544" font-size="34" font-family="Arial" font-weight="800">GHG LEVELS</text><text x="34" y="368" fill="#f8fbff" font-size="30" font-family="Arial">CO₂, CH₄, N₂O at historic highs</text></g><g transform="translate(760 275)"><path d="M80 365 Q280 300 470 365 T820 365 L820 440 L80 440 Z" fill="#0b253e" stroke="#22c7f3"/>
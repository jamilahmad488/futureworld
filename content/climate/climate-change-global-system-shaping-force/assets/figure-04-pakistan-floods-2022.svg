<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Figure 4 Pakistan floods 2022"><defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#020617"/><stop offset="1" stop-color="#071426"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1600" height="900" fill="url(#bg)"/><rect x="28" y="28" width="1544" height="844" rx="34" fill="none" stroke="#22c7f3" stroke-width="3" opacity=".75"/><text x="80" y="95" fill="#f2b544" font-size="42" font-family="Arial" font-weight="800">FIGURE 4</text><text x="80" y="165" fill="#f8fbff" font-size="68" font-family="Arial" font-weight="900">PAKISTAN FLOODS 2022</text><text x="80" y="222" fill="#d8e7ff" font-size="34" font-family="Arial">Climate risk as a national development shock</text><g transform="translate(80 280)"><rect width="560" height="82" rx="16" fill="rgba(34,199,243,.07)" stroke="#22c7f3"/><text x="32" y="55" fill="#f2b544" font-size="42" font-family="Arial" font-weight="900">33 MILLION</text><text x="310" y="55" fill="#f8fbff" font-size="30" font-family="Arial">people affected</text><rect y="102" width="560" height="82" rx="16" fill="rgba(34,199,243,.07)" stroke="#22c7f3"/><text x="32" y="157" fill="#f2b544" font-size="42" font-family="Arial" font-weight="900">1,730+</text><text x="250" y="157" fill="#f8fbff" font-size="30" font-family="Arial">lives lost</text><rect y="204" width="560" height="82" rx="16" fill="rgba(34,199,243,.07)" stroke="#22c7f3"/><text x="32" y="259" fill="#f2b544" font-size="42" font-family="Arial" font-weight="900">US$14.9B+</text><text x="310" y="259" fill="#f8fbff" font-size="30" font-family="Arial">damages</text><rect y="306" width="560" height="82" rx="16" fill="rgba(34,199,243,.07)" stroke="#22c7f3"/><text x="32" y="361" fill="#f2b544" font-size="42" font-family="Arial" font-weight="900">US$15.2B</text><text x="310" y="361" fill="#f8fbff" font-size="30" font-family="Arial">economic losses</text></g><g transform="translate(760 300)"><path d="M0 335 C130 270 210 320 315 250 C440 165 520 250 715 150 V500 H0 Z" fill="#0b3951" opacity=".75"/><path d="M40 365 C180 300 270 350 410 260 C500 205 600 230 720 175" fill="none" stroke="#22c7f3" stroke-width="9" filter="url(#glow)"/><g fill="#f8fbff" opacity=".75"><rect x="90" y="285" width="75" height="58"/><rect x="230" y="240" width="72" height="63"/><rect x="385" y="255" width="85" height="70"/><rect x="540" y="210" width="78" height="65"/></g><text x="20" y="560" fill="#f2b544" font-size="34" font-family="Arial" font-weight="800">Most affected sectors</text><text x="20" y="610" fill="#d8e7ff" font-size="30" font-family="Arial">Housing • Agriculture &amp; livestock • Transport &amp; communications</text></g><text x="80" y="825" fill="#22c7f3" font-size="28" font-family="Arial">Source:</text><text x="190" y="825" fill="#f8fbff" font-size="28" font-family="Arial">World Bank / ADB / EU / UNDP / Government of Pakistan PDNA</text><image href="/assets/logo.png" x="1035" y="735" width="390" height="115" preserveAspectRatio="xMidYMid meet"/></svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Figure 5 Food security stress"><defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#020617"/><stop offset="1" stop-color="#17110a"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1600" height="900" fill="url(#bg)"/><rect x="28" y="28" width="1544" height="844" rx="34" fill="none" stroke="#22c7f3" stroke-width="3" opacity=".75"/><text x="80" y="95" fill="#f2b544" font-size="42" font-family="Arial" font-weight="800">FIGURE 5</text><text x="80" y="165" fill="#f8fbff" font-size="70" font-family="Arial" font-weight="900">FOOD SECURITY STRESS</text><text x="80" y="222" fill="#d8e7ff" font-size="34" font-family="Arial">Global hunger and food insecurity indicators, 2023</text><text x="120" y="350" fill="#f2b544" font-size="88" font-family="Arial" font-weight="900" filter="url(#glow)">733 MILLION</text><text x="120" y="405" fill="#f8fbff" font-size="34" font-family="Arial">people facing hunger</text><text x="120" y="535" fill="#22c7f3" font-size="88" font-family="Arial" font-weight="900" filter="url(#glow)">2.33 BILLION</text><text x="120" y="590" fill="#f8fbff" font-size="34" font-family="Arial">people moderately or severely food insecure</text><g transform="translate(880 285)"><ellipse cx="300" cy="350" rx="300" ry="80" fill="#4b2f14" opacity=".7"/><path d="M300 360 C280 260 315 170 405 95" stroke="#6ee7b7" stroke-width="12" fill="none"/><path d="M300 330 C255 235 190 185 115 175 C165 240 225 280 300 330Z" fill="#35d07f"/><path d="M335 275 C390 210 460 185 535 205 C480 260 410 295 335 275Z" fill="#77f29d"/><path d="M382 130 C415 92 470 65 545 80 C500 125 445 150 382 130Z" fill="#a7f3d0"/><circle cx="300" cy="350" r="18" fill="#f2b544" filter="url(#glow)"/><text x="40" y="500" fill="#f2b544" font-size="34" font-family="Arial" font-weight="800">Climate drivers</text><text x="40" y="550" fill="#d8e7ff" font-size="28" font-family="Arial">Extreme heat • Droughts • Floods</text><text x="40" y="592" fill="#d8e7ff" font-size="28" font-family="Arial">Changing rainfall • Pests • Water scarcity</text></g><text x="80" y="825" fill="#22c7f3" font-size="28" font-family="Arial">Source:</text><text x="190" y="825" fill="#f8fbff" font-size="28" font-family="Arial">FAO — SOFI 2024 (FAO, IFAD, UNICEF, WFP, WHO)</text><image href="/assets/logo.png" x="1035" y="735" width="390" height="115" preserveAspectRatio="xMidYMid meet"/></svg>
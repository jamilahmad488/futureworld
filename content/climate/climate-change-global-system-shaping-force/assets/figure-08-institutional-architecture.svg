<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Figure 8 Institutional climate architecture"><defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#020617"/><stop offset="1" stop-color="#071426"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1600" height="900" fill="url(#bg)"/><rect x="28" y="28" width="1544" height="844" rx="34" fill="none" stroke="#22c7f3" stroke-width="3" opacity=".75"/><text x="80" y="95" fill="#f2b544" font-size="42" font-family="Arial" font-weight="800">FIGURE 8</text><text x="80" y="160" fill="#f8fbff" font-size="66" font-family="Arial" font-weight="900">INSTITUTIONAL CLIMATE ARCHITECTURE</text><text x="80" y="220" fill="#d8e7ff" font-size="34" font-family="Arial">The world has reorganized around climate risk</text><g transform="translate(90 330)" font-family="Arial"><g><circle cx="80" cy="80" r="58" fill="rgba(34,199,243,.08)" stroke="#22c7f3"/><text x="80" y="90" fill="#22c7f3" font-size="38" text-anchor="middle">PA</text><text x="80" y="185" fill="#f8fbff" font-size="28" text-anchor="middle" font-weight="800">Paris Agreement</text></g><g transform="translate(240 0)"><circle cx="80" cy="80" r="58" fill="rgba(34,199,243,.08)" stroke="#22c7f3"/><text x="80" y="92" fill="#22c7f3" font-size="36" text-anchor="middle">NDC</text><text x="80" y="185" fill="#f8fbff" font-size="28" text-anchor="middle" font-weight="800">NDCs</text></g><g transform="translate(480 0)"><circle cx="80" cy="80" r="58" fill="rgba(34,199,243,.08)" stroke="#22c7f3"/><text x="80" y="92" fill="#22c7f3" font-size="36" text-anchor="middle">ETF</text><text x="80" y="185" fill="#f8fbff" font-size="28" text-anchor="middle" font-weight="800">Transparency</text></g><g transform="translate(720 0)"><circle cx="80" cy="80" r="58" fill="rgba(242,181,68,.08)" stroke="#f2b544"/><text x="80" y="92" fill="#f2b544" font-size="36" text-anchor="middle">GST</text><text x="80" y="185" fill="#f8fbff" font-size="28" text-anchor="middle" font-weight="800">Global Stocktake</text></g><g transform="translate(960 0)"><circle cx="80" cy="80" r="58" fill="rgba(242,181,68,.08)" stroke="#f2b544"/><text x="80" y="92" fill="#f2b544" font-size="48" text-anchor="middle">$</text><text x="80" y="185" fill="#f8fbff" font-size="28" text-anchor="middle" font-weight="800">Climate Finance</text></g><g transform="translate(1200 0)"><circle cx="80" cy="80" r="58" fill="rgba(57,255,156,.08)" stroke="#39ff9c"/><text x="80" y="92" fill="#39ff9c" font-size="36" text-anchor="middle">CB</text><text x="80" y="185" fill="#f8fbff" font-size="28" text-anchor="middle" font-weight="800">Capacity</text></g><path d="M150 80H247M390 80H487M630 80H727M870 80H967M1110 80H1207" stroke="#22c7f3" stroke-width="4" filter="url(#glow)"/></g><rect x="170" y="610" width="1260" height="95" rx="22" fill="rgba(34,199,243,.06)" stroke="#22c7f3"/><text x="210" y="670" fill="#d8e7ff" font-size="32" font-family="Arial">Treaties, national plans, reporting systems, stocktakes, finance and capacity-building now shape climate policy cycles.</text><text x="80" y="825" fill="#22c7f3" font-size="28" font-family="Arial">Source:</text><text x="190" y="825" fill="#f8fbff" font-size="28" font-family="Arial">UNFCCC — Paris Agreement and NDC Framework</text><image href="/assets/logo.png" x="1035" y="735" width="390" height="115" preserveAspectRatio="xMidYMid meet"/></svg>
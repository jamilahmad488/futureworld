<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Figure 9 Projection toward 2035"><defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#020617"/><stop offset="1" stop-color="#071426"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1600" height="900" fill="url(#bg)"/><rect x="28" y="28" width="1544" height="844" rx="34" fill="none" stroke="#22c7f3" stroke-width="3" opacity=".75"/><text x="80" y="95" fill="#f2b544" font-size="42" font-family="Arial" font-weight="800">FIGURE 9</text><text x="360" y="140" fill="#f8fbff" font-size="68" font-family="Arial" font-weight="900">PROJECTION TOWARD 2035</text><text x="350" y="200" fill="#d8e7ff" font-size="34" font-family="Arial">Climate change will shape the future through six pathways</text><g transform="translate(95 310)" font-family="Arial"><g><polygon points="0,70 70,0 210,0 280,70 210,140 70,140" fill="rgba(34,199,243,.08)" stroke="#22c7f3"/><text x="140" y="205" fill="#22c7f3" font-size="26" text-anchor="middle" font-weight="800">Climate-resilient development</text></g><g transform="translate(245 0)"><polygon points="0,70 70,0 210,0 280,70 210,140 70,140" fill="rgba(57,255,156,.07)" stroke="#39ff9c"/><text x="140" y="205" fill="#39ff9c" font-size="26" text-anchor="middle" font-weight="800">Food &amp; water security</text></g><g transform="translate(490 0)"><polygon points="0,70 70,0 210,0 280,70 210,140 70,140" fill="rgba(242,181,68,.08)" stroke="#f2b544"/><text x="140" y="205" fill="#f2b544" font-size="26" text-anchor="middle" font-weight="800">Early warning &amp; DRR</text></g><g transform="translate(735 0)"><polygon points="0,70 70,0 210,0 280,70 210,140 70,140" fill="rgba(34,199,243,.08)" stroke="#22c7f3"/><text x="140" y="205" fill="#22c7f3" font-size="26" text-anchor="middle" font-weight="800">Climate finance shift</text></g><g transform=
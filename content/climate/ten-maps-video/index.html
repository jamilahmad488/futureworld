<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ten Maps That Explain Climate Change | FutureWorld Intelligence Video</title>
<style>
:root{--bg:#030914;--panel:rgba(8,18,33,.86);--text:#eef7ff;--muted:#aebfd3;--gold:#f6bb45;--cyan:#21d4f3;--teal:#16f5cf;--line:rgba(255,255,255,.14);--shadow:0 18px 60px rgba(0,0,0,.45);--navW:min(1320px,calc(100% - 28px));}
*{box-sizing:border-box} html,body{margin:0;height:100%;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at 18% 0%,rgba(33,212,243,.12),transparent 28%),radial-gradient(circle at 84% 10%,rgba(246,187,69,.10),transparent 26%),linear-gradient(180deg,#020712 0%,#071323 45%,#020712 100%);color:var(--text);overflow:hidden}
body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:48px 48px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.75),transparent 86%);pointer-events:none}
a{color:inherit;text-decoration:none}
.topnav{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:40;width:var(--navW);border:1px solid rgba(33,212,243,.22);border-radius:999px;background:rgba(3,10,24,.78);backdrop-filter:blur(18px);box-shadow:0 18px 55px rgba(0,0,0,.38), inset 0 0 24px rgba(33,212,243,.035)}
.topnav .inner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 10px}
.brand{display:flex;align-items:center;gap:10px;padding:5px 13px 5px 6px;border:1px solid rgba(246,187,69,.30);border-radius:999px;background:linear-gradient(135deg,rgba(246,187,69,.14),rgba(33,212,243,.07));color:var(--text);font-weight:900;letter-spacing:.06em;text-transform:uppercase;font-size:13px;transition:.25s ease}
.brand:hover{transform:translateY(-1px);border-color:rgba(246,187,69,.65);box-shadow:0 0 22px rgba(246,187,69,.16)}
.brand img{width:38px;height:38px;border-radius:50%;object-fit:cover;border:1px solid rgba(246,187,69,.35)}
.quick{display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-end}
.quick a,.quick button{border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:9px 13px;background:rgba(255,255,255,.045);color:#dceaff;font-weight:800;letter-spacing:.045em;text-transform:uppercase;font-size:12px;transition:.25s ease;cursor:pointer}
.quick a:hover,.quick button:hover,.quick a.active{color:#06111f;background:linear-gradient(90deg,var(--cyan),var(--teal));border-color:rgba(33,212,243,.75);box-shadow:0 0 22px rgba(33,212,243,.22)}
.quick .home-link{color:#111827;background:linear-gradient(90deg,var(--gold),#ffe39a);border-color:rgba(246,187,69,.8)}
.quick .home-link:hover{box-shadow:0 0 25px rgba(246,187,69,.28)}
.stage{position:absolute;inset:78px 14px 112px;display:flex;align-items:center;justify-content:center}
.frame{width:min(100%,1400px);height:100%;aspect-ratio:16/9;background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);overflow:hidden;position:relative;display:grid;grid-template-columns:1.42fr .58fr}
.frame:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 12% 10%,rgba(33,212,243,.08),transparent 24%),radial-gradient(circle at 88% 0%,rgba(246,187,69,.08),transparent 24%);pointer-events:none}
.visual{position:relative;padding:22px;display:flex;flex-direction:column;gap:12px}
.map-wrap{flex:1;border:1px solid rgba(33,212,243,.22);border-radius:20px;background:#020814;overflow:hidden;position:relative;box-shadow:inset 0 0 40px rgba(33,212,243,.04);display:flex;align-items:center;justify-content:center;padding:10px}
.map-wrap img{width:100%;height:100%;object-fit:contain;display:block}
.caption{font-size:12px;color:#b0c1d5;background:rgba(0,0,0,.32);padding:9px 12px;border-radius:12px;border:1px solid var(--line)}
.content{padding:22px 22px 18px;border-left:1px solid var(--line);background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(255,255,255,.03));display:flex;flex-direction:column}
.kicker{color:var(--gold);text-transform:uppercase;letter-spacing:.16em;font-size:11px;font-weight:900;margin-bottom:10px;display:flex;align-items:center;gap:8px} .kicker:before{content:"";width:36px;height:2px;background:var(--gold)}
#slideTitle{font-size:clamp(26px,2.6vw,44px);line-height:1.04;letter-spacing:-.03em;margin:0 0 8px}
#slideSubtitle{font-size:16px;color:#d7e4f0;margin:0 0 14px}
.bullets{margin:0;padding-left:18px;display:grid;gap:8px;color:#eef7ff;font-size:14px;line-height:1.45}
.source{margin-top:auto;border-top:1px solid var(--line);padding-top:12px;font-size:11.5px;color:#b4c1cf}
.source b{color:var(--gold)}
.lowerbar{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;width:var(--navW);z-index:50;border:1px solid rgba(33,212,243,.22);border-radius:20px;background:rgba(3,10,24,.82);backdrop-filter:blur(18px);box-shadow:var(--shadow);padding:10px 12px}
.controls{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center}
.ctrl-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ctrl-btn{border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:10px 14px;background:rgba(255,255,255,.05);color:#e8f6ff;font-weight:800;cursor:pointer;transition:.2s} .ctrl-btn:hover{background:linear-gradient(90deg,var(--cyan),var(--teal));color:#07101d}
.progress-wrap{display:grid;gap:8px;align-items:center}
.progress-meta{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:#c6d6e6}
.progress{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid var(--line)}
.progress > div{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--cyan),var(--teal));transition:width .4s ease}
.slide-dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.slide-dots button{width:11px;height:11px;border:none;border-radius:50%;background:rgba(255,255,255,.22);cursor:pointer;padding:0} .slide-dots button.active{background:linear-gradient(90deg,var(--gold),var(--cyan));box-shadow:0 0 14px rgba(33,212,243,.35)}
.start-overlay{position:fixed;inset:0;background:rgba(2,7,18,.82);display:flex;align-items:center;justify-content:center;z-index:90}
.start-card{width:min(720px,92vw);background:linear-gradient(180deg,rgba(8,18,33,.96),rgba(8,18,33,.92));border:1px solid var(--line);border-radius:28px;padding:34px;box-shadow:var(--shadow);text-align:center}
.start-card h1{margin:0 0 12px;font-size:42px;line-height:1.02} .start-card p{color:#d1deeb;font-size:18px;max-width:620px;margin:0 auto 18px}
.start-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}
.primary{border:none;border-radius:999px;padding:14px 22px;background:linear-gradient(90deg,var(--gold),#ffe39a);color:#101621;font-weight:900;cursor:pointer} .secondary{border:1px solid var(--line);border-radius:999px;padding:14px 22px;background:rgba(255,255,255,.06);color:var(--text);font-weight:900;cursor:pointer}
@media (max-width: 1100px){.frame{grid-template-columns:1fr} .content{border-left:none;border-top:1px solid var(--line)} .stage{inset:94px 10px 128px} .quick{display:none} .map-wrap{min-height:48vh}}
</style>
</head>
<body>
<nav class="topnav" aria-label="FutureWorld standard navigation"><div class="inner"><a class="brand" href="../../../index.html" aria-label="Return to FutureWorld Intelligence home"><img src="assets/Logo.png" alt="FutureWorld Intelligence logo"><span>FutureWorld</span></a><div class="quick"><a class="home-link" href="../../../index.html">Home</a><a href="../../../pages/climate.html">Climate Center</a><a class="active" href="#">Video</a><button id="jumpMaps">Maps</button></div></div></nav>
<div class="stage"><div class="frame"><section class="visual"><div class="map-wrap"><img id="slideImage" src="assets/Logo.png" alt="Climate map visual"></div><div class="caption" id="slideCaption"></div></section><section class="content"><div class="kicker">FutureWorld Intelligence • 16:9 Climate Video</div><h1 id="slideTitle"></h1><p id="slideSubtitle"></p><ul class="bullets" id="slideBullets"></ul><div class="source" id="slideSource"></div></section></div></div>
<div class="lowerbar"><div class="controls"><div class="ctrl-group"><button class="ctrl-btn" id="prevBtn">◀ Prev</button><button class="ctrl-btn" id="playBtn">Play</button><button class="ctrl-btn" id="pauseBtn">Pause</button><button class="ctrl-btn" id="nextBtn">Next ▶</button><button class="ctrl-btn" id="muteBtn">Mute Voice</button></div><div class="progress-wrap"><div class="progress-meta"><span id="progressText">Slide 1 of 13</span><span id="timerText">Ready</span></div><div class="progress"><div id="progressBar"></div></div></div><div class="slide-dots" id="slideDots"></div></div></div>
<div class="start-overlay" id="startOverlay"><div class="start-card"><h1>Ten Maps That Explain Climate Change</h1><p>A 16:9 FutureWorld Intelligence climate video report presenting eleven climate maps with full-map display and synchronized narration.</p><div class="start-actions"><button class="primary" id="startBtn">Start Presentation</button><button class="secondary" id="manualBtn">Manual Mode</button></div></div></div>
<script>
const slides = [{"id": "intro", "title": "Ten Maps That Explain Climate Change", "subtitle": "A 16:9 FutureWorld Intelligence video presentation", "image": "Logo.png", "caption": "FutureWorld Intelligence opening slide.", "source": "Presentation synthesis based on NASA, WMO, IPCC, Global Forest Watch, WRI, NOAA, ND-GAIN, IEA, UNEP and the FutureWorld climate report.", "bullets": ["This presentation now follows the full 11-map sequence.", "Each map has its own dedicated slide and narration block.", "Use the controls below to navigate, replay or pause at any point."], "narration": "Welcome to FutureWorld Intelligence. This video follows the full eleven map sequence that explains climate change through warming, emissions, ecosystems, risk, governance and resilience."}, {"id": "m1", "title": "Map 1 — The Geography of Global Warming", "subtitle": "Where the planet is heating fastest", "image": "the_geography_of_global_warming.png", "caption": "Global warming and temperature-anomaly map panel.", "source": "NASA global temperature indicator; WMO State of the Global Climate 2024.", "bullets": ["Warming is uneven across the planet.", "Land and high northern latitudes heat faster than the global average.", "Regional warming patterns shape local climate risk and adaptation needs."], "narration": "Map one shows the geography of global warming. The world is heating unevenly, with land areas and high northern latitudes warming faster than the global average. This uneven pattern drives different levels of risk across regions."}, {"id": "m2", "title": "Map 2 — Carbon Emissions and Industrial Civilization", "subtitle": "The geography of fossil-fuel development", "image": "carbon_emissions_and_global_industrial_hotspots.png", "caption": "Global carbon-emission hotspots.", "source": "Global Carbon Project; UNEP Emissions Gap Report 2024.", "bullets": ["Emission hotspots cluster around industrial and urban regions.", "Historical responsibility is uneven across countries.", "Climate justice remains central to the global response."], "narration": "Map two reveals the geography of carbon emissions. Industrial centers, transport corridors and fossil-fuel energy systems dominate the map. It also shows the justice gap between historical emitters and many climate-vulnerable countries."}, {"id": "m3", "title": "Map 3 — Forest Loss and Natural Climate Infrastructure", "subtitle": "Why forests matter for climate stability", "image": "forest_loss_and_climate_impact_map.png", "caption": "Forest-loss and ecosystem-impact map panel.", "source": "Global Forest Watch; FAO forest datasets; IPCC AR6.", "bullets": ["Forests regulate carbon, water, soils and biodiversity.", "Deforestation weakens climate resilience far beyond forest boundaries.", "Restoration and assisted natural regeneration are strategic responses."], "narration": "Map three focuses on forests. Forests act as natural climate infrastructure by storing carbon, regulating water and stabilizing landscapes. When forests decline, the impacts spread into watersheds, biodiversity and community resilience."}, {"id": "m4", "title": "Map 4 — Water Stress and the Geography of Scarcity", "subtitle": "Climate change and freshwater insecurity", "image": "global_water_stress_and_scarcity_map.png", "caption": "Global water-stress map panel.", "source": "WRI Aqueduct water stress analysis; World Bank water-security resources.", "bullets": ["Water stress links climate change with food, livelihoods and ecosystems.", "Higher temperatures and changing rainfall alter freshwater availability.", "Watershed restoration and better water management are critical."], "narration": "Map four shows water stress. Climate change is reshaping water availability through higher temperatures, changing rainfall and pressure on rivers and aquifers. Water security is becoming one of the defining challenges of climate adaptation."}, {"id": "m5", "title": "Map 5 — Rising Seas and Coastal Vulnerability", "subtitle": "The slow-moving transformation of coastlines", "image": "rising_seas_and_coastal_vulnerability_map.png", "caption": "Sea-level rise and coastal exposure panel.", "source": "NOAA Sea Level Rise Viewer; WMO State of the Global Climate 2024.", "bullets": ["Sea-level rise magnifies flooding, erosion and salinity intrusion.", "Low-lying deltas and coastal cities face compound risk.", "Adaptation requires planning, ecosystem buffers and resilient infrastructure."], "narration": "Map five addresses sea-level rise. Even gradual increases in sea level make storms and tidal flooding more damaging. Coastal vulnerability is therefore an environmental, infrastructure and urban-planning challenge."}, {"id": "m6", "title": "Map 6 — Extreme Weather in a Warming World", "subtitle": "Heat, floods, drought and wildfire risk", "image": "extreme_weather_map_and_climate_risks.png", "caption": "Extreme-weather and multi-hazard risk panel.", "source": "WMO State of the Global Climate 2024; IPCC AR6.", "bullets": ["A warmer atmosphere intensifies many weather extremes.", "Communities increasingly face compounding hazards rather than single events.", "Preparedness depends on early warning and resilient systems."], "narration": "Map six examines extreme weather. Climate change intensifies many hazards, including heat, heavy rainfall, drought and wildfire risk. In reality, communities often experience these impacts as compounding crises."}, {"id": "m7", "title": "Map 7 — Biodiversity Under Pressure", "subtitle": "Climate stress on ecosystems and species", "image": "biodiversity_stress_and_climate_impact_map.png", "caption": "Biodiversity and ecosystem-stress map panel.", "source": "IPBES Global Assessment; IPCC AR6.", "bullets": ["Climate change disrupts habitats, migration and ecological stability.", "Biodiversity supports food systems, soils, water and resilience.", "Protecting ecological integrity is part of climate adaptation."], "narration": "Map seven focuses on biodiversity. Climate change is adding pressure to ecosystems already stressed by land-use change and pollution. Biodiversity underpins water, food and ecosystem resilience, so its protection is part of climate action."}, {"id": "m8", "title": "Map 8 — Climate Vulnerability and Human Exposure", "subtitle": "Where risk and low adaptive capacity overlap", "image": "climate_vulnerability_and_human_exposure_map.png", "caption": "Climate vulnerability and human exposure panel.", "source": "ND-GAIN Country Index; IPCC AR6.", "bullets": ["Climate vulnerability is shaped by exposure, poverty and institutional capacity.", "The heaviest burdens often fall on the least-resourced communities.", "Adaptation must therefore be ecological, social and governance-based."], "narration": "Map eight looks at vulnerability. Climate risk becomes most severe where physical exposure overlaps with poverty, weak infrastructure and limited governance capacity. This is why resilience must be both ecological and social."}, {"id": "m9", "title": "Map 9 — Renewable Energy and the New Energy Geography", "subtitle": "A transition in progress", "image": "renewable_energy_growth_and_global_corridors.png", "caption": "Renewable-energy growth and corridor map panel.", "source": "IEA Renewables 2024; IRENA; UNEP Emissions Gap Report 2024.", "bullets": ["Solar, wind and storage are redrawing energy geography.", "The transition supports energy security and emission reduction together.", "Finance, grids and policy determine how fast it advances."], "narration": "Map nine turns to the energy transition. Renewable energy is changing the geography of power, investment and development opportunity. The key question is whether the transition can advance fast enough and fairly enough."}, {"id": "m10", "title": "Map 10 — Climate Governance and Adaptation Readiness", "subtitle": "The institutions behind climate outcomes", "image": "map_10_climate_governance.png", "caption": "Climate governance and adaptation-readiness map panel.", "source": "Original FutureWorld editorial map based on ND-GAIN, World Bank, OECD DAC and climate-readiness concepts.", "bullets": ["Climate outcomes depend on institutions, finance, policy and delivery systems.", "Readiness is highest where governance is stronger and implementation is more capable.", "The implementation gap remains one of the biggest climate risks."], "narration": "Map ten focuses on climate governance and adaptation readiness. Climate science alone does not deliver resilience. Outcomes depend on institutions, finance, policy and the ability to implement plans effectively."}, {"id": "m11", "title": "Map 11 — The Geography of Climate Resilience", "subtitle": "FutureWorld's map of solutions", "image": "map_11_climate_resilience.png", "caption": "Climate resilience pathways and solution hotspots.", "source": "Original FutureWorld editorial map synthesizing resilience pathways from climate adaptation and restoration literature.", "bullets": ["Resilience grows where multiple solutions work together.", "Forest restoration, water security, clean energy and community adaptation reinforce one another.", "Climate intelligence helps direct resources to the right places faster."], "narration": "Map eleven is the geography of climate resilience. It shifts the story from diagnosis to action. Resilience grows where ecosystems are restored, water systems are secured, communities are prepared and climate intelligence guides decisions."}, {"id": "end", "title": "Conclusion — Reading the Planet, Shaping the Future", "subtitle": "FutureWorld Intelligence • Climate • Ecology • Resilience", "image": "Logo.png", "caption": "End slide.", "source": "Visit FutureWorld Intelligence for the full report and related climate content.", "bullets": ["The eleven-map sequence connects climate risks, governance and resilience pathways.", "The accompanying website report provides the deeper written analysis.", "This video can be published at a clean URL as a standard FutureWorld content page."], "narration": "You have reached the end of the presentation. The eleven-map sequence connects climate risks, governance and resilience pathways. For deeper analysis, explore the FutureWorld climate report and related content online."}];
let current = 0, playing = false, muted = false, advanceTimer = null, elapsedTimer = null, slideStart = 0;
const el = {img:slideImage,title:slideTitle,subtitle:slideSubtitle,bullets:slideBullets,source:slideSource,caption:slideCaption,progressBar:progressBar,progressText:progressText,timerText:timerText,slideDots:slideDots,startOverlay:startOverlay};
function buildDots(){ el.slideDots.innerHTML=''; slides.forEach((s,i)=>{ const b=document.createElement('button'); b.title=`Go to slide ${i+1}: ${s.title}`; b.onclick=()=>goTo(i,true); el.slideDots.appendChild(b); }); }
function render(){ const s=slides[current]; el.img.src='assets/'+s.image; el.img.alt=s.title; el.title.textContent=s.title; el.subtitle.textContent=s.subtitle; el.caption.textContent=s.caption; el.bullets.innerHTML=s.bullets.map(b=>`<li>${b}</li>`).join(''); el.source.innerHTML=`<b>Source note:</b> ${s.source}`; el.progressText.textContent=`Slide ${current+1} of ${slides.length}`; el.progressBar.style.width=`${((current+1)/slides.length)*100}%`; [...el.slideDots.children].forEach((d,i)=>d.classList.toggle('active',i===current)); }
function cancelSpeech(){ if(window.speechSynthesis) window.speechSynthesis.cancel(); clearTimeout(advanceTimer); clearInterval(elapsedTimer); }
function updateElapsed(){ const sec=Math.max(0,Math.floor((Date.now()-slideStart)/1000)); const mm=String(Math.floor(sec/60)).padStart(2,'0'); const ss=String(sec%60).padStart(2,'0'); el.timerText.textContent = playing ? `Narration ${mm}:${ss}` : 'Paused'; }
function fallbackDuration(text){ const words=(text||'').split(/\s+/).filter(Boolean).length; return Math.max(6500, Math.round(words/2.35*1000)); }
function nextAuto(){ current=(current+1)%slides.length; render(); if(playing) speakCurrent(); }
function speakCurrent(){ cancelSpeech(); const s=slides[current]; slideStart=Date.now(); updateElapsed(); elapsedTimer=setInterval(updateElapsed,250); const fallback=fallbackDuration(s.narration); if(muted || !('speechSynthesis' in window)){ advanceTimer=setTimeout(nextAuto,fallback+700); return; } const u=new SpeechSynthesisUtterance(s.narration); u.rate=0.94; u.pitch=1; u.volume=1; const voices=speechSynthesis.getVoices(); const preferred=voices.find(v=>/en-GB|en-US|English/i.test((v.lang||'')+' '+(v.name||'')))||voices[0]; if(preferred) u.voice=preferred; u.onend=()=>{ if(playing) advanceTimer=setTimeout(nextAuto,900); }; u.onerror=()=>{ if(playing) advanceTimer=setTimeout(nextAuto,fallback+700); }; speechSynthesis.speak(u); }
function play(){ playing=true; document.getElementById('playBtn').textContent='Playing'; render(); speakCurrent(); }
function pause(){ playing=false; document.getElementById('playBtn').textContent='Play'; cancelSpeech(); el.timerText.textContent='Paused'; }
function goTo(i,user){ current=(i+slides.length)%slides.length; render(); if(playing || user) speakCurrent(); }
function nextManual(){ current=(current+1)%slides.length; render(); if(playing) speakCurrent(); }
function prevManual(){ current=(current-1+slides.length)%slides.length; render(); if(playing) speakCurrent(); }
function manualMode(){ playing=false; render(); el.timerText.textContent='Manual mode'; el.startOverlay.style.display='none'; }
buildDots(); render(); if('speechSynthesis' in window) speechSynthesis.onvoiceschanged=()=>{};
startBtn.onclick=()=>{ startOverlay.style.display='none'; play(); }; manualBtn.onclick=()=>manualMode(); playBtn.onclick=()=>play(); pauseBtn.onclick=()=>pause(); nextBtn.onclick=()=>nextManual(); prevBtn.onclick=()=>prevManual(); muteBtn.onclick=()=>{ muted=!muted; muteBtn.textContent = muted ? 'Unmute Voice' : 'Mute Voice'; if(playing) speakCurrent(); }; jumpMaps.onclick=()=>goTo(1,true);
document.querySelectorAll('.topnav a[href]').forEach(a=>{if(a.getAttribute('href') !== '#'){a.addEventListener('click',()=>stopPresentation());}});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowRight') nextManual(); if(e.key==='ArrowLeft') prevManual(); if(e.key===' '){ e.preventDefault(); playing?pause():play(); } });
</script>
</body>
